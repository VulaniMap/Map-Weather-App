<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink:wght@100..900&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Map Weather App</title>
  </head>
  <body>
    <div class="weather-app">
      <header>
        <form>
          <input type="search" placeholder="Enter a city...." required />
          <input type="submit" value="search" />
        </form>
      </header>
      <main>
        <div>
          <h1>Johannesburg</h1>
          <p>
            Tuesday 15:00, partly cloudy
            <br />
            Humidity: 50%, Wind: 5.22 km/h
          </p>
        </div>
        <div>😶‍🌫️ 19&deg;C</div>
      </main>
      <footer>
        Coded by
        <a href="https://github.com/VulaniMap " target="_blank">
          Vulani Mapiyeye
        </a>
        info hosted
        <a href="https://github.com/VulaniMap/Map-Weather-App " target="_blank">
          on GitHub
        </a>
        and website hosted
        <a href="https://map-weather-app.onrender.com/" target="_blank">
          on Render</a
        >
      </footer>
    </div>
  </body>
</html>
