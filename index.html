<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink:wght@100..900&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Map Weather App</title>
  </head>
  <body>
    <div class="weather-app">
      <header>
        <form class="search-form" id="search-form">
          <input
            type="search"
            placeholder="Enter a city...."
            required
            class="search-form-input"
            id="search-form-input"
          />
          <input type="submit" value="Search" class="search-buttom" />
        </form>
      </header>
      <main>
        <div class="current-weather">
          <div>
            <h1 class="current-city" id="current-city">Johannesburg</h1>
            <p class="current-info">
              Tuesday 15:00, partly cloudy
              <br />
              Humidity:<strong>50%</strong>, Wind:<strong> 5.22km/h</strong>
            </p>
          </div>
          <div class="current-temparature">
            <span class="current-temperature-icon">😶‍🌫️</span>
            <span class="current-temperature-value">19</span>
            <span class="current-temperature-unit">°C</span>
          </div>
        </div>
      </main>
      <footer>
        Coded by
        <a href="https://github.com/VulaniMap " target="_blank">
          Vulani Mapiyeye
        </a>
        info hosted
        <a href="https://github.com/VulaniMap/Map-Weather-App " target="_blank">
          on GitHub
        </a>
        and website hosted
        <a href="https://map-weather-app.onrender.com/" target="_blank">
          on Render</a
        >
      </footer>
    </div>
    <script src="src/index.js"></script>
  </body>
</html>
